  # --- Management Tools ---

  pgadmin:
    image: dpage/pgadmin4
    container_name: irctc-pgadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@irctc.com
      PGADMIN_DEFAULT_PASSWORD: password
    networks:
      - irctc-network

  redis-insight:
    image: redis/redisinsight:latest
    container_name: irctc-redis-insight
    restart: always
    ports:
      - "8001:8001"
    networks:
      - irctc-network

  # --- Application Layer ---

networks:
  irctc-network:
    driver: bridge


  # loki:
  #   image: grafana/loki:latest
  #   container_name: irctc-loki
  #   restart: always
  #   ports:
  #     - "3100:3100"
  #   command: -config.file=/etc/loki/local-config.yaml
  #   networks:
  #     - irctc-network

  # tempo:
  #   image: grafana/tempo:latest
  #   container_name: irctc-tempo
  #   restart: always
  #   ports:
  #     - "4317:4317" # OTLP gRPC
  #     - "4318:4318" # OTLP HTTP
  #     - "3200:3200"

services:
  # --- Infrastructure Layer ---

  postgres:
    image: postgres:16-alpine
    container_name: irctc-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: irctc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - irctc-network

  redis:
    image: redis:7-alpine
    container_name: irctc-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - irctc-network

  # --- Messaging Layer (KRaft Mode - Using Confluent Image for stability) ---
  # Two listeners because Kafka clients resolve advertised addresses against
  # their OWN network namespace. `localhost` means the client container (or
  # host), not the broker. Splitting EXTERNAL (host) from INTERNAL (docker
  # network) keeps both client classes happy with one broker.
  #   EXTERNAL :9092  -> advertised as localhost:9092     (host-side `pnpm dev`)
  #   INTERNAL :29092 -> advertised as irctc-kafka:29092  (other containers)

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: irctc-kafka
    restart: always
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@irctc-kafka:9093"
      KAFKA_LISTENERS: "EXTERNAL://:9092,INTERNAL://:29092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "EXTERNAL://localhost:9092,INTERNAL://irctc-kafka:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - irctc-network

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:v1.5.0
    container_name: irctc-kafka-ui
    restart: always
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: irctc-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: irctc-kafka:29092
    networks:
      - irctc-network

  # --- Observability Stack ---

  # alloy:
  #   image: grafana/alloy:latest
  #   container_name: irctc-alloy
  #   restart: always
  #   ports:
  #     - "12345:12345"
  #   volumes:
  #     - ./infra/alloy/config.alloy:/etc/alloy/config.alloy
  #   command: run --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
  #   networks:
  #     - irctc-network

  # loki:
  #   image: grafana/loki:latest
  #   container_name: irctc-loki
  #   restart: always
  #   ports:
  #     - "3100:3100"
  #   command: -config.file=/etc/loki/local-config.yaml
  #   networks:
  #     - irctc-network

  tempo:
    image: grafana/tempo:latest
    container_name: irctc-tempo
    restart: always
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "3200:3200"   # Tempo query API
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    command: ["-config.file=/etc/tempo.yaml"]
    networks:
      - irctc-network

  grafana:
    image: grafana/grafana:latest
    container_name: irctc-grafana
    restart: always
    depends_on:
      - tempo
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - irctc-network

  # --- Management Tools ---

  pgadmin:
    image: dpage/pgadmin4:9.15.0
    container_name: irctc-pgadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@irctc.com
      PGADMIN_DEFAULT_PASSWORD: password
    networks:
      - irctc-network

  redis-insight:
    image: redis/redisinsight:3.4.2
    container_name: irctc-redis-insight
    restart: always
    ports:
      - "8001:8001"
    networks:
      - irctc-network

  # --- Application Layer ---

  # Creates the OTP and DLQ topics once at stack startup. Topics are not
  # auto-created (allowAutoTopicCreation: false on the producer) so this
  # sidecar is the only source of topic creation. The container exits
  # successfully after the topics are created; restart is "no" so it
  # does not loop.
  #
  # The application services (user-service, notification-service) are
  # not part of this compose file — they run via `pnpm dev` on the host
  # for now. See apps/*/Dockerfile (TODO) when the team is ready to
  # containerise the runtime.
  kafka-init:
    image: confluentinc/cp-kafka:7.8.0
    container_name: irctc-kafka-init
    depends_on:
      - kafka
    networks:
      - irctc-network
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Waiting for Kafka broker..."
        until kafka-topics --bootstrap-server irctc-kafka:29092 --list >/dev/null 2>&1; do
          echo "Waiting for Kafka..."; sleep 2
        done
        echo "Creating Kafka topics..."
        kafka-topics --bootstrap-server irctc-kafka:29092 \
          --create --if-not-exists \
          --topic notification.otp-requested.v1 \
          --partitions 1 --replication-factor 1 \
          --config retention.ms=604800000
        kafka-topics --bootstrap-server irctc-kafka:29092 \
          --create --if-not-exists \
          --topic notification.otp-requested.v1.dlq \
          --partitions 1 --replication-factor 1 \
          --config retention.ms=2592000000
        kafka-topics --bootstrap-server irctc-kafka:29092 \
          --create --if-not-exists \
          --topic notification.user-logged-in.v1 \
          --partitions 1 --replication-factor 1 \
          --config retention.ms=604800000
        kafka-topics --bootstrap-server irctc-kafka:29092 \
          --create --if-not-exists \
          --topic notification.user-logged-in.v1.dlq \
          --partitions 1 --replication-factor 1 \
          --config retention.ms=2592000000
        echo "Kafka topics created."

  traefik:
    image: traefik:v3.1
    container_name: irctc-traefik
    restart: always
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8082:8080"   # Traefik dashboard (localhost only)
      - "8899:8899"   # Prometheus metrics
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - irctc-network
    depends_on:
      - api-gateway
      - tempo

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: irctc-api-gateway
    restart: always
    environment:
      NODE_ENV: production
      PORT: 4000
      REDIS_URL: redis://irctc-redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      USER_UPSTREAM: http://irctc-user-service:4001
      NOTIFICATION_UPSTREAM: http://irctc-notification-service:4002
      RATE_LIMIT_DEFAULT_CAPACITY: 100
      RATE_LIMIT_DEFAULT_REFILL_PER_SEC: "1.6667"
      RATE_LIMIT_AUTH_CAPACITY: 10
      RATE_LIMIT_AUTH_REFILL_PER_SEC: "0.1667"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://irctc-tempo:4318}
      OTEL_SERVICE_NAME: api-gateway
      SERVICE_NAME: api-gateway
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=Host(`localhost`)"
      - "traefik.http.routers.gateway.entrypoints=web"
      - "traefik.http.routers.gateway.middlewares=secureHeaders@file,cors@file,retry@file"
      - "traefik.http.services.gateway.loadbalancer.server.port=4000"
    ports:
      - "4000:4000"
    networks:
      - irctc-network
    depends_on:
      - user-service
      - notification-service
      - redis

  user-service:
    build:
      context: .
      dockerfile: apps/user-service/Dockerfile
    container_name: irctc-user-service
    restart: always
    command: sh -c "npx prisma migrate deploy && node --import @irctc/telemetry/instrumentation dist/server.js"
    environment:
      PORT: 4001
      DATABASE_URL: postgresql://admin:password@irctc-postgres:5432/irctc_db
      REDIS_URL: redis://irctc-redis:6379
      KAFKA_BROKERS: irctc-kafka:29092
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGINS: ${CORS_ORIGINS}
      SERVICE_NAME: user-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SERVICE_NAME: user-service
    expose:
      - "4001"
    networks:
      - irctc-network
    depends_on:
      - postgres
      - redis
      - kafka

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    container_name: irctc-notification-service
    restart: always
    environment:
      PORT: 4002
      REDIS_URL: redis://irctc-redis:6379
      KAFKA_BROKERS: irctc-kafka:29092
      KAFKA_CLIENT_ID: notification-service
      SERVICE_NAME: notification-service
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_SENDER: ${SENDGRID_SENDER}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SERVICE_NAME: notification-service
    expose:
      - "4002"
    networks:
      - irctc-network
    depends_on:
      - redis
      - kafka


networks:
  irctc-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  tempo_data:
  grafana_data:
